<!DOCTYPE html>
<html>
<head>
    <title>CSMS Forget Password</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <h2>CSMS</h2>
        <div class="nav-links">
            <a href="/">Login</a>
            <a href="/signup">Signup</a>
        </div>
    </div>

    <!-- FORGET PASSWORD BOX -->
    <div class="auth-box">

        <div class="card">

            <div class="title">
                Forgot Password
            </div>

            <!-- FLASH MESSAGE -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash flash-{{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <!-- FORM -->
            <form action="/forget_password" method="POST">

                <input 
                    type="email"
                    name="email"
                    placeholder="Enter Registered Email"
                    required
                >

                <button type="submit">
                    Send OTP
                </button>

            </form>

            <!-- LINK -->
            <div style="margin-top:15px; text-align:center;">
                <p>
                    Remember your password?
                    <a href="/">Login</a>
                </p>
            </div>

        </div>
    </div>

</body>
</html>
